<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ Test Platform</title>
<style>
/* ===== DARK INTJ STYLE ===== */
body {
  margin:0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background:#0d0b1f;
  color:#e0d9ff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  transition: background 0.3s, color 0.3s;
}
.container {
  background:#1a142f;
  padding:30px;
  border-radius:15px;
  width:90%;
  max-width:700px;
  box-shadow:0 0 20px #8a2be250;
}
h1,h2 {
  text-align:center;
}
button {
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:#8a2be2;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button:hover {
  box-shadow:0 0 10px #8a2be2;
  transform:scale(1.03);
}
.progress {
  height:12px;
  background:#0d0b1f;
  border-radius:6px;
  margin:15px 0;
}
.progress-bar {
  height:12px;
  background:#8a2be2;
  border-radius:6px;
  width:0%;
  transition: width 0.3s ease;
}
.answer-correct {
  background:#00ff88 !important;
  color:black;
  animation: flash 0.5s;
}
.answer-wrong {
  background:#ff0044 !important;
  color:white;
  animation: shake 0.5s;
}
@keyframes flash {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
  100% { transform: translateX(0); }
}
.timer {
  text-align:center;
  font-size:18px;
  margin:10px 0;
  font-weight:bold;
}
</style>
</head>
<body>
<div class="container" id="app">
<h1>IQ Test Platform</h1>
<button onclick="selectLevel('easy')">easy</button>
<button onclick="selectLevel('medium')">medium</button>
<button onclick="selectLevel('hard')">hard</button>
</div>

<script>
let level="";
let totalQuestions=0;
let currentQuestion=0;
let score=0;
let questions=[];
let timer;
let timeLeft=60;

// ===== MAXIMUM QUESTIONS FOR EACH LEVEL =====
const questionBank={
easy:[
{q:"2,4,6,8,?",a:["9","10","11","12"],c:1},
{q:"A,C,E,G,?",a:["H","I","J","K"],c:1},
{q:"1,1,2,2,3,3,?",a:["3","4","5","6"],c:1},
{q:"3,5,7,9,11 qaysi ortiqcha?",a:["3","5","9","11"],c:2},
{q:"5 ta qalam 25000 so‘m, 1 tasi?",a:["4000","5000","6000","7000"],c:1},
// Дополнительно можно добавить ещё вопросы до 30+
],
medium:[
{q:"3,6,12,24,?",a:["36","48","60","72"],c:1},
{q:"7,14,28,56,?",a:["84","98","112","124"],c:2},
{q:"1,4,9,16,?",a:["20","21","25","24"],c:2},
{q:"2,5,10,17,?",a:["26","25","28","27"],c:0},
{q:"3,9,27,?",a:["54","72","81","90"],c:2},
],
hard:[
{q:"2,3,5,9,17,?",a:["25","33","31","35"],c:1},
{q:"8,4,12,6,18,?",a:["9","12","10","8"],c:0},
{q:"1,3,6,10,15,?",a:["18","20","21","22"],c:2},
{q:"3,8,15,24,?",a:["33","35","36","38"],c:2},
{q:"5,10,20,40,?",a:["50","60","80","80"],c:3},
]
};

function selectLevel(lvl){
level=lvl;
document.getElementById("app").innerHTML=`
<h2>Savol sonini tanlang</h2>
<button onclick="startQuiz(10)">10</button>
<button onclick="startQuiz(20)">20</button>
<button onclick="startQuiz(30)">30</button>
`;
}

function startQuiz(num){
totalQuestions=num;
currentQuestion=0;
score=0;
questions=[];
for(let i=0;i<num;i++){
let randomQ=questionBank[level][Math.floor(Math.random()*questionBank[level].length)];
questions.push(randomQ);
}
showQuestion();
}

function startTimer(){
timeLeft=60;
document.getElementById("timer").textContent=`Vaqt: ${timeLeft}s`;
timer=setInterval(()=>{
timeLeft--;
document.getElementById("timer").textContent=`Vaqt: ${timeLeft}s`;
if(timeLeft<=0){
clearInterval(timer);
nextQuestion();
}
},1000);
}

function showQuestion(){
if(currentQuestion>=totalQuestions){ showResult(); return; }
clearInterval(timer);
let q=questions[currentQuestion];
let progressPercent=(currentQuestion/totalQuestions)*100;
document.getElementById("app").innerHTML = `
<div class="progress"><div class="progress-bar" style="width:${progressPercent}%"></div></div>
<div class="timer" id="timer">Vaqt: 60s</div>
<h2>${q.q}</h2>
${q.a.map((opt,i)=>`<button onclick="checkAnswer(${i})">${opt}</button>`).join('')}
`;
startTimer();
}

function checkAnswer(index){
clearInterval(timer);
let q=questions[currentQuestion];
let buttons=document.querySelectorAll('button');
if(index===q.c){
buttons[index].classList.add('answer-correct');
score++;
}else{
buttons[index].classList.add('answer-wrong');
buttons[q.c].classList.add('answer-correct');
}
setTimeout(nextQuestion,1000);
}

function showResult(){
  document.getElementById("app").innerHTML=`
    <h2>Natija</h2>
    <p>Siz ${totalQuestions} ta savoldan ${score} tasiga to‘g‘ri javob berdingiz.</p>
    <button onclick="restartQuiz()">Qayta boshlash</button>
  `;
}

function restartQuiz(){
  level=""; 
  totalQuestions=0;
  currentQuestion=0;
  score=0;
  questions=[];
  document.getElementById("app").innerHTML=`
    <h1>IQ Test Platform</h1>
    <button onclick="selectLevel('easy')">easy</button>
    <button onclick="selectLevel('medium')">medium</button>
    <button onclick="selectLevel('hard')">hard</button>
  `;
}
  
</script>
</body>
</html>
