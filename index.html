<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ Test Platform</title>
<style>
/* ===== DARK INTJ STYLE ===== */
body {
  margin:0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background:#0d0b1f;
  color:#e0d9ff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  transition: background 0.3s, color 0.3s;
}
.container {
  background:#1a142f;
  padding:30px;
  border-radius:15px;
  width:90%;
  max-width:700px;
  box-shadow:0 0 20px #8a2be250;
}
h1,h2 {
  text-align:center;
}
button {
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:#8a2be2;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button:hover {
  box-shadow:0 0 10px #8a2be2;
  transform:scale(1.03);
}
.progress {
  height:12px;
  background:#0d0b1f;
  border-radius:6px;
  margin:15px 0;
}
.progress-bar {
  height:12px;
  background:#8a2be2;
  border-radius:6px;
  width:0%;
  transition: width 0.3s ease;
}
.answer-correct {
  background:#00ff88 !important;
  color:black;
  animation: flash 0.5s;
}
.answer-wrong {
  background:#ff0044 !important;
  color:white;
  animation: shake 0.5s;
}
@keyframes flash {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
  100% { transform: translateX(0); }
}
.timer {
  text-align:center;
  font-size:18px;
  margin:10px 0;
  font-weight:bold;
}
</style>
</head>

  });

  document.getElementById("nextBtn").style.display = "none";
