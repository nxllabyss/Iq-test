<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQ Test Application</title>
    <style>
        body {
            background-color: #300000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            animation: fadeIn 1s;
        }
        h1 { margin-top: 20px; }
        .difficulty { margin: 20px; }
        .progress { height: 20px; background: #600000; }
        .progress-bar {
            height: 100%;
            background: #ff0000;
            width: 0;
        }
        .score { font-size: 24px; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <h1>IQ Test Application</h1>
    <div class="difficulty">
        <label for="difficulty">Select Difficulty:</label>
        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>
    </div>
    <div>
        <label for="questionCount">Question Count:</label>
        <input type="number" id="questionCount" value="10" min="1" max="50">
    </div>
    <div>
        <label for="timer">Timer Option:</label>
        <select id="timer">
            <option value="none">None</option>
            <option value="30">30 seconds</option>
            <option value="60">1 minute</option>
            <option value="120">2 minutes</option>
        </select>
    </div>
    <button id="startButton">Start Test</button>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="score" id="scoreDisplay">Score: 0</div>
    <script>
        document.getElementById('startButton').addEventListener('click', startTest);
        function startTest() {
            // Initialize test settings
            const difficulty = document.getElementById('difficulty').value;
            const questionCount = document.getElementById('questionCount').value;
            const timer = document.getElementById('timer').value;
            let score = 0;
            let currentQuestion = 0;
            let totalQuestions = parseInt(questionCount);
            // Start timer if selected
            if (timer !== 'none') {
                setTimeout(() => {
                    alert('Time is up! Your score is: ' + score);
                }, timer * 1000);
            }
            // Simulate questions
            const interval = setInterval(() => {
                if (currentQuestion < totalQuestions) {
                    // Simulate displaying a question and score update
                    score += Math.floor(Math.random() * 10); // Random score increment for demo
                    currentQuestion++;
                    updateScore();
                    updateProgress();
                } else {
                    clearInterval(interval);
                    alert('Test complete! Your final score is: ' + score);
                }
            }, 1000);
            function updateScore() {
                document.getElementById('scoreDisplay').innerText = 'Score: ' + score;
            }
            function updateProgress() {
                const progressBar = document.getElementById('progressBar');
                progressBar.style.width = (currentQuestion / totalQuestions) * 100 + '%';
            }
        }
    </script>
</body>
</html>
